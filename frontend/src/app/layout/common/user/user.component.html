<!-- Button -->
<button
    mat-icon-button
    [matMenuTriggerFor]="userActions">
    <span class="relative inline-flex items-center justify-center">

        <!-- Avatar si disponible -->
        <img
            class="w-6 h-6 rounded-full object-cover"
            *ngIf="showAvatar && user.avatar"
            [src]="user.avatar">

        <!-- Icône utilisateur fallback -->
        <svg
            *ngIf="!showAvatar || !user.avatar"
            class="w-5 h-5 text-gray-300"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.7">
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M20 21a8 8 0 0 0-16 0">
            </path>
            <circle
                cx="12"
                cy="7"
                r="4">
            </circle>
        </svg>

        <!-- Status point -->
        <span
            class="absolute right-0 bottom-0 w-2.5 h-2.5 rounded-full border border-white"
            [ngClass]="{
                'bg-green-500': user.status === 'online',
                'bg-amber-500': user.status === 'away',
                'bg-red-500': user.status === 'busy',
                'bg-gray-400': user.status === 'not-visible'
            }">
        </span>
    </span>
</button>

<!-- User menu -->
<mat-menu
    [xPosition]="'before'"
    #userActions="matMenu">

    <!-- User info -->
    <div class="px-4 py-3 border-b border-gray-200">
        <div class="text-xs text-gray-500">
            Connecté en tant que
        </div>
        <div class="mt-1 font-semibold text-gray-900">
            Admin Triweb
        </div>
        <div class="text-sm text-gray-500">
            admin&#64;triweb.com
        </div>
    </div>

    <!-- Profile -->
    <button mat-menu-item>
        <svg
            class="w-5 h-5 mr-3 text-gray-600"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M20 21a8 8 0 0 0-16 0">
            </path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Profil</span>
    </button>

    <!-- Settings -->
    <button mat-menu-item>
        <svg
            class="w-5 h-5 mr-3 text-gray-600"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 0 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 1-1.6V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.6h.1a1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6 1h.1a2 2 0 0 1 0 4H21a1.7 1.7 0 0 0-1.6 1z">
            </path>
        </svg>
        <span>Paramètres</span>
    </button>

    <!-- Status -->
    <button
        mat-menu-item
        [matMenuTriggerFor]="userStatus">
        <svg
            class="w-5 h-5 mr-3 text-gray-600"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <circle cx="5" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="19" cy="12" r="1.5"></circle>
        </svg>
        <span>Statut</span>
    </button>

    <mat-divider class="my-2"></mat-divider>

    <!-- Sign out -->
    <button
        mat-menu-item
        (click)="signOut()">
        <svg
            class="w-5 h-5 mr-3 text-gray-600"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4">
            </path>
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M16 17l5-5-5-5">
            </path>
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 12H9">
            </path>
        </svg>
        <span>Se déconnecter</span>
    </button>
</mat-menu>

<!-- User status menu -->
<mat-menu
    class="user-status-menu"
    #userStatus="matMenu">

    <button
        mat-menu-item
        (click)="updateUserStatus('online')">
        <span class="w-4 h-4 mr-3 rounded-full bg-green-500"></span>
        <span>En ligne</span>
    </button>

    <button
        mat-menu-item
        (click)="updateUserStatus('away')">
        <span class="w-4 h-4 mr-3 rounded-full bg-amber-500"></span>
        <span>Absent</span>
    </button>

    <button
        mat-menu-item
        (click)="updateUserStatus('busy')">
        <span class="w-4 h-4 mr-3 rounded-full bg-red-500"></span>
        <span>Occupé</span>
    </button>

    <button
        mat-menu-item
        (click)="updateUserStatus('not-visible')">
        <span class="w-4 h-4 mr-3 rounded-full bg-gray-400"></span>
        <span>Invisible</span>
    </button>
</mat-menu>
