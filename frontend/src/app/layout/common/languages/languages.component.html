<div class="flex items-end flex-shrink-0 gap-1 lang-flags-row">
    <button
        mat-icon-button
        type="button"
        class="lang-flag-btn"
        [class.lang-active]="activeLang === 'fr'"
        [attr.aria-label]="'Français'"
        [attr.aria-pressed]="activeLang === 'fr'"
        (click)="setActiveLang('fr')"
    >
        <ng-container *ngTemplateOutlet="flagImage; context: {$implicit: 'fr'}"></ng-container>
    </button>

    <button
        mat-icon-button
        type="button"
        class="lang-flag-btn"
        [class.lang-active]="activeLang === 'en'"
        [attr.aria-label]="'English'"
        [attr.aria-pressed]="activeLang === 'en'"
        (click)="setActiveLang('en')"
    >
        <ng-container *ngTemplateOutlet="flagImage; context: {$implicit: 'en'}"></ng-container>
    </button>
</div>

<!-- Flag image template -->
<ng-template
    let-lang
    #flagImage
>
    <span class="lang-flag-wrap relative block shadow rounded-sm overflow-hidden bg-gray-100">
        <span class="absolute inset-0 ring-1 ring-inset ring-black ring-opacity-10"></span>
        <img
            class="w-full h-full object-cover"
            [src]="'assets/images/flags/' + flagCodes[lang] + '.svg'"
            [alt]="lang === 'fr' ? 'Drapeau France' : 'Flag United States'"
        />
    </span>
</ng-template>
