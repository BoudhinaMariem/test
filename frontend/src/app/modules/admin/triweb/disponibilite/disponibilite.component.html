
<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10 bg-gray-50">
  <div>
    <div class="text-3xl font-extrabold tracking-tight">{{ title }}</div>
    <div class="text-secondary mt-1">{{ subtitle }}</div>
  </div>
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 mt-8">
    <div class="xl:col-span-2 bg-card rounded-2xl shadow p-6">
      <div class="text-lg font-semibold mb-4">Disponibilité collaborateurs</div>
      <dx-data-grid [dataSource]="availabilityItems" [showBorders]="false" [columnAutoWidth]="true" [rowAlternationEnabled]="true">
        <dxi-column dataField="collaborateur"></dxi-column>
        <dxi-column dataField="equipe"></dxi-column>
        <dxi-column dataField="disponibilite" caption="Disponibilité (%)"></dxi-column>
        <dxi-column dataField="statut"></dxi-column>
      </dx-data-grid>
    </div>
    <div class="bg-card rounded-2xl shadow p-6">
      <div class="text-lg font-semibold mb-4">Répartition</div>
      <dx-pie-chart [dataSource]="statusData" type="doughnut">
        <dxi-series argumentField="statut" valueField="valeur"></dxi-series>
      </dx-pie-chart>
    </div>
  </div>
</div>
