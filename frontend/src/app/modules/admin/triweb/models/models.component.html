
<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10 bg-gray-50">
  <div>
    <div class="text-3xl font-extrabold tracking-tight">{{ title }}</div>
    <div class="text-secondary mt-1">{{ subtitle }}</div>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mt-8">
    <div class="bg-card rounded-2xl shadow p-6"><div class="text-secondary text-sm">Modèles actifs</div><div class="mt-2 text-3xl font-bold">1</div></div>
    <div class="bg-card rounded-2xl shadow p-6"><div class="text-secondary text-sm">Précision moyenne</div><div class="mt-2 text-3xl font-bold">84%</div></div>
    <div class="bg-card rounded-2xl shadow p-6"><div class="text-secondary text-sm">Dernier run</div><div class="mt-2 text-3xl font-bold">Aujourd'hui</div></div>
  </div>
  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 mt-8">
    <div class="xl:col-span-2 bg-card rounded-2xl shadow p-6">
      <div class="text-lg font-semibold mb-4">Catalogue des modèles</div>
      <dx-data-grid [dataSource]="modelsItems" [showBorders]="false" [columnAutoWidth]="true">
        <dxi-column dataField="modele" caption="Modèle"></dxi-column>
        <dxi-column dataField="version"></dxi-column>
        <dxi-column dataField="statut"></dxi-column>
        <dxi-column dataField="usage"></dxi-column>
        <dxi-column dataField="precision" caption="Précision"></dxi-column>
      </dx-data-grid>
    </div>
    <div class="bg-card rounded-2xl shadow p-6">
      <div class="text-lg font-semibold mb-4">Roadmap</div>
      <div class="space-y-4 text-sm">
        <div><span class="font-semibold">Étape 1:</span> brancher les vraies APIs .NET.</div>
        <div><span class="font-semibold">Étape 2:</span> exposer les endpoints Python.</div>
        <div><span class="font-semibold">Étape 3:</span> afficher les scores en production.</div>
      </div>
    </div>
  </div>
</div>
